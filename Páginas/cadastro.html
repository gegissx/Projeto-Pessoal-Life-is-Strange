<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/cadastro.css" />

    <!-- fontes-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Loop:ital@0;1&display=swap" rel="stylesheet"
    />

  </head>

  <body>
    <!-- NavBar-->
    <header>
      <nav class="navBar">
        <div class="titulo">
          <h1>LISblog</h1>
        </div>

        <div class="menu">
          <a href="index.html">Home</a>
          <a href="#">Posts</a>
          <a href="#">Sobre</a>
        </div>

        <div class="botoes">
          <p>Já tem uma conta?</p>
          <a href="#" class="cadastro">Faça seu login</a>
        </div>
      </nav>
    </header>

    <div class="corpo">

      <!--Aréa do cadastro-->

      <div class="container">

        <div class="area-cadastro" >

        <h1>Criar Conta</h1>
        <h3>Comece a escrever sua história!</h3> <br><br>

        <div class="inputs" >

        <p>Nome completo<span id="erroNome"></span></p> 
        <input type="text" id="ipt_nome" placeholder="𖨆  Insira seu nome completo"> <br><br>

        <p>Nickname<span id="erroNick"></span></p> 
        <input type="text" id="ipt_NickName" placeholder="🜲  Insira seu Nickname"> <br><br>

        <p>E-mail<span id="erroEmail"></span></p> 
        <input type="text" id="ipt_email" placeholder="✉ Insira seu e-mail"> <br> <br>

        <p>Senha<span id="erroSenha"></span></p> 
        <input type="text" id="ipt_senha" placeholder="🔒︎ Insira sua senha"> <br><br>

        </div>


         <button class="botao" onclick="CriarConta()">Criar conta 𖦹</button>

        </div>

        <div id="texto"></div>
        </div>

      <!--Polaroids-->

      <div class="polaroid" >
      <img src="../imgs/polaroid_ArcadiaBay.png" alt="">
      </div>

    </div>
    
  </body>
</html>

<script>

  let ListaNickname = ['teste'];
  let ListaEmail = ['teste'];

  function CriarConta(){
  let nome = ipt_nome.value;
  let nick = ipt_NickName.value;
  let email = ipt_email.value;
  let senha = ipt_senha.value;

  // Verificação nome

    if (nome = ``){erroNome.innerHTML = `<span class="mensagem_erro">ⓘ Por favor, informe seu nome</span>`

    } else {erroNome.innerHTML = ``;}

  // Verificação Nickname

  if (nick == ``) {erroNick.innerHTML = `<span class="mensagem_erro">ⓘ Por favor, informe um Nickname</span>`}
  else {erroNick = ``;

  for (let index = 0; index < ListaNickname.length; index++) {
    if(ListaNickname[index] == nick){
      texto.innerHTML = `Este nick já está sendo utilizado`
    } else {ListaNickname.push(nick)}
  }}

  // Verificação Email

  if (email == `` || !email.includes('@')) {erroEmail.innerHTML = `<span class="mensagem_erro">ⓘ Por favor, informe um E-mail válido</span>`}
  else {erroEmail.innerHTML = ``;

  for (let index = 0; index < ListaEmail.length; index++) {
    if (ListaEmail[index] == email){
      texto.innerHTML = `Este e-mail já está sendo utilizado`
    } else {ListaEmail.push(email)}}

    
  }

  }
</script>
